services:
  - type: web
    name: ddb-backend
    env: python
    rootDir: backend
    plan: starter
    buildCommand: ./render-build.sh
    startCommand: gunicorn ddb_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ddb-backend.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://ddb-frontend.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://ddb-frontend.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: CELERY_BROKER_URL
        value: memory://
      - key: CELERY_RESULT_BACKEND
        value: cache+memory://

  - type: web
    name: ddb-frontend
    env: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: VITE_API_URL
        value: https://ddb-backend.onrender.com/api/v1
